body:
  text: 天台山幽溪沙門傳燈集一切恭敬一心頂禮十方常住三寶一拜已互跪燒香散華願此香華雲遍滿十方界無邊佛土中無量香莊嚴具足菩薩道成就如來香輟唱想云我此香華遍十方至同入無生證佛智想已唱云供養已一切恭敬一拜互跪贊云佛面猶如淨滿月亦如千日放光明目淨修廣若青蓮齒白齊密猶珂雪佛德無邊如大海無限妙寶積其中智慧德水鎮常盈百千勝定咸充滿足下輪相皆嚴飾軗輞千輻悉齊平手足縵網遍莊嚴猶如鵝王相具足佛身晃耀等金山清淨殊特無端匹亦如妙高功德滿故我稽首佛山王相好如空不可測逾於千日放光明皆如焰幻不思議故我稽首心無著讚已重燒香然彼禮諸相好足下安平如奩底足下千輻輪相手足指長勝餘人手足柔軟勝餘身分手足指合縵網勝餘人足跟具足滿好足趺高好跟相稱一心頂禮過去維衛佛迦葉佛手足滿手足如意手文明直手文長手文不斷手足赤白如蓮華色踝不現爪如赤銅色薄而細滑指長纖圓指文藏覆脈深不現手足軟淨滑澤手足有德相如伊尼延鹿王腨纖好膝骨堅著圓好立手摩膝陰藏相如馬王臍深圓好一心頂禮過去維衛佛迦葉佛臍不出腹不現其腹細孔門相具身縱廣等身堅實如那羅延骨際如鈎鎖身上如師子王身清淨身柔軟身不曲身潤澤身自持不逶迤身滿足身不傾動身持重其身大其身長一心頂禮過去維衛佛迦葉佛身端直肩圓好一一毛孔青色柔軟毛上向毛右旋毛紅色毛軟淨皮膚薄細滑不受塵水不停蚊蚋兩足下兩手兩肩項中七處滿兩腋下滿毛孔出香氣頰車如師子唇色如頻婆果四十齒具足齒白齊密而根深四牙最白而大四牙白利舌薄覆面至髮際一心頂禮過去維衛佛迦葉佛舌色赤舌薄廣隨衆生音聲不增不減説法不著隨衆生語言説法發音報衆聲次第有因緣説法咽中津液得味中上味口出無上香一切聲分具足言音聲遠梵音深遠如迦陵頻迦聲隨衆生意和悅與語面不長丈正容白不撓色面具滿足面廣姝好面淨滿如月一心頂禮過去維衛佛迦葉佛鼻高孔不現眼色如金精眼睫如牛王廣長眼平等視衆生不輕衆生眉如初月紺琉璃色眉間白毫如兜羅綿耳輪輻相埵成頭如摩陀那果髮長好髮不好髮旋亂髮色青珠頂肉髻成無見頂相金色光其相微妙身光面各一丈一心頂禮過去維衛佛迦葉佛四邊光各一丈光照身而行行時足去地四寸而印文現威儀如師子進止如象王行法如鵝王身一時回如象王容儀備足容儀滿足住處安無能動者威振一切一切樂觀一心頂禮過去維衛佛迦葉佛一切衆生不能盡觀相觀無厭足一切惡心衆生見者和悅八萬四千相好光明禮已重燒香懺悔發願云至心懺悔我弟子某甲與法界一切衆生現前一念清淨本然具無量相好光明一切神通自在良由真如妙性不變隨緣成六尺蕞爾之身棄百千澄清大海聚緣內搖趣外奔逸縱身口意起貪嗔癡身三口四而無惡不為五逆七遮而無罪不造竪窮九世橫遍六根開八萬四千塵勞之門備八萬四千煩惱之法自頂至足何處有功德藂林由外及中無非是罪惡園藪業因不忒果報無差緣薄善而暫往人天因重愆而終歸惡道不重佛性埋沒己靈妄來妄往而徒費精神浪死虗生而毫無利益然以罪無自性其體本空既不變以隨緣故隨緣而不變悟之成性固不涉於階差起以成修要必託乎尊勝普賢十行禮敬為先淨土五門懺悔為最恭聞維衛善逝迦葉如來一性圓成於劫三身普覆於十方示滅度非滅度石像由南海而浮來非神通現神通寶鉢自西天而泛至故知像性即佛量等虗空三身宛然四德無減歸依者福增無量懺悔者罪滅河沙故竭愚誠向二尊而頂禮五體投地接兩足以翹勤達能禮所禮其性虗通感之應之不可思議如帝網之千珠瑤天之萬目光光交映彼波互融對八萬四千相好之尊設八萬四千至誠之禮寂滅八萬四千煩惱成就八萬四千度門惟願神通顯示威德冥加使戒定慧清淨以無瑕聞思修精進而不退念念無違法性塵塵皆見寂光即此凡夫之身堪作菩提之器衆生無邊誓願度煩惱無數誓願斷法門無量誓願學佛道無上誓願成願命終時神不亂正念直往生安養面奉彌陀值衆聖修行十地勝常樂懺悔發願已一心歸命頂禮起身一拜重燒香散華如法旋繞南無十方佛南無十方法南無十方僧南無維衛佛南無迦葉佛南無諸尊菩薩摩訶薩或三遍或七遍旋畢至佛前三自歸依自歸於佛當願衆生體解大道發無上心自歸於法當願衆生深入經藏智慧如海自歸於僧當願衆生統理大衆一切無礙和南聖衆
